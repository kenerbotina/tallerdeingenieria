<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EcoScan IA · Clasificador Inteligente de Residuos</title>

<link rel="icon" type="image/png" href="favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
</head>
<body>

<main class="container">

  <header class="header">
    <h1>EcoScan <span>IA</span></h1>
    <p class="subtitle">Apunta la cámara a un residuo y la IA te dirá dónde va</p>
  </header>

  <!-- Pantalla de resultado tipo "consola" -->
  <section class="display-screen" id="screen" data-state="idle">
    <span class="status-title" id="status-title">Estado del sensor</span>
    <span class="status-result" id="status-result">Cámara detenida</span>
    <span class="status-desc" id="status-desc">Presiona «Iniciar escáner» para comenzar el análisis.</span>
  </section>

  <!-- Panel del escáner -->
  <section class="scanner-panel">

    <div class="viewfinder" id="viewfinder" data-active="false">
      <video id="video" playsinline autoplay muted></video>
      <canvas id="capture-canvas" hidden></canvas>

      <div class="viewfinder-frame" aria-hidden="true">
        <span class="corner tl"></span>
        <span class="corner tr"></span>
        <span class="corner bl"></span>
        <span class="corner br"></span>
        <span class="scan-line"></span>
      </div>

      <div class="viewfinder-placeholder" id="viewfinder-placeholder">
        <svg viewBox="0 0 24 24" width="42" height="42" fill="none" stroke="currentColor" stroke-width="1.4">
          <path d="M4 8V6a2 2 0 0 1 2-2h2M20 8V6a2 2 0 0 1-2-2h-2M4 16v2a2 2 0 0 0 2 2h2M20 16v2a2 2 0 0 1-2 2h-2"/>
          <circle cx="12" cy="12" r="3.4"/>
        </svg>
        <span>Vista previa de la cámara</span>
      </div>

      <span class="camera-badge" id="camera-badge" hidden></span>
    </div>

    <div class="controls">
      <button class="btn btn-primary" id="start-btn" type="button">Iniciar escáner</button>
      <button class="btn btn-ghost" id="switch-btn" type="button" hidden title="Cambiar de cámara">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M17 2l4 4-4 4"/><path d="M3 12v-2a4 4 0 0 1 4-4h14"/>
          <path d="M7 22l-4-4 4-4"/><path d="M21 12v2a4 4 0 0 1-4 4H3"/>
        </svg>
        Cambiar cámara
      </button>
      <button class="btn btn-accent" id="capture-btn" type="button" hidden title="Tomar foto">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
          <circle cx="12" cy="13" r="4"/>
        </svg>
        Tomar foto
      </button>
    </div>

    <p class="error-msg" id="error-msg" hidden></p>

    <div class="predictions" id="label-container" aria-live="polite"></div>
  </section>

</main>

<!-- Modal de foto capturada -->
<div class="photo-modal" id="photo-modal" hidden>
  <div class="photo-modal-card">
    <!-- Contenedor para la foto con overlay de resultado -->
    <div class="photo-container">
      <img id="photo-preview" alt="Foto capturada del residuo">
      <div class="photo-overlay" id="photo-overlay">
        <div class="overlay-badge" id="overlay-badge">
          <span class="badge-icon" id="badge-icon">📦</span>
          <div class="badge-text">
            <span class="badge-label" id="badge-label">—</span>
            <span class="badge-value" id="badge-value">0%</span>
          </div>
        </div>
      </div>
    </div>

    <div class="photo-modal-result">
      <span id="photo-result-label">—</span>
      <span id="photo-result-value">—</span>
    </div>

    <div class="photo-modal-actions">
      <button class="btn btn-ghost" id="retake-btn" type="button">Tomar otra</button>
      <a class="btn btn-primary" id="download-btn" download="ecoscan-residuo.png">Guardar imagen</a>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
